packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@effect/platform-browser": 4.0.0-beta.65
  "@effect/platform-node": 4.0.0-beta.65
  "@effect/sql-clickhouse": 4.0.0-beta.65
  "@effect/vitest": 4.0.0-beta.65
  "@platformatic/kafka": 2.0.1
  "@vitejs/plugin-react": 6.0.1
  "@vitest/coverage-v8": 4.1.5
  "@vitest/browser-playwright": 4.1.5
  "@types/node": ^24
  "@types/react": ^19
  "@types/react-dom": ^19
  chdb: 1.6.0
  effect: 4.0.0-beta.65
  playwright: 1.59.1
  react: 19.2.6
  react-dom: 19.2.6
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.5
  vite-plus: latest
  "@effect/language-service": 0.86.1
  "@types/ws": 8.18.1
  ws: 8.20.0
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
onlyBuiltDependencies:
  - chdb
  - msgpackr-extract
  - protobufjs
allowBuilds:
  chdb: true
  msgpackr-extract: true
  protobufjs: true

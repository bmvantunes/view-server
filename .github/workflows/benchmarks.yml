name: Benchmarks

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  VS_BENCH_BLOCKING: "1"
  VS_BENCH_REGRESSION_MIN_DELTA_MS: "5"

jobs:
  smoke:
    name: Smoke Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "26"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Resolve pnpm store
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prepare artifact directory
        run: mkdir -p packages/core/bench/.artifacts/ci packages/core/bench/.artifacts/profiles

      - name: Run smoke benchmarks
        run: node --experimental-strip-types packages/core/bench/ci-smoke.ts

      - name: Run firehose benchmarks (report-only)
        if: always()
        continue-on-error: true
        env:
          VS_BENCH_BLOCKING: "0"
        run: node --experimental-strip-types packages/core/bench/benchmark-profile.ts --profile firehose-ci --compare

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts
          path: packages/core/bench/.artifacts/**/*.json
          if-no-files-found: warn
          include-hidden-files: true

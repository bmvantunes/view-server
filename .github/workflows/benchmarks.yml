name: Benchmarks

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  VS_BENCH_BLOCKING: "0"
  VS_BENCH_REGRESSION_MIN_DELTA_MS: "5"

jobs:
  smoke:
    name: Smoke Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prepare artifact directory
        run: mkdir -p packages/core/bench/.artifacts/ci

      - name: Run smoke benchmarks
        run: node --experimental-strip-types packages/core/bench/ci-smoke.ts

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts
          path: packages/core/bench/.artifacts/ci/*.json
          if-no-files-found: warn

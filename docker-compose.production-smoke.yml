name: view-server-production-smoke

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      VIEW_SERVER_HOST: 0.0.0.0
      VIEW_SERVER_PORT: 3000
      VIEW_SERVER_DEMO_ROWS: ${VIEW_SERVER_DEMO_ROWS:-128}
      VIEW_SERVER_DEMO_PUBLISH_INTERVAL_MS: ${VIEW_SERVER_DEMO_PUBLISH_INTERVAL_MS:-150}
    ports:
      - "${VIEW_SERVER_DEPLOYMENT_SMOKE_PORT:-3100}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/ready'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
